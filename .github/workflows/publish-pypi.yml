# Build sdist + wheel and upload to PyPI when a version tag is pushed (e.g. v0.1.0).
# Requires a PyPI Trusted Publisher for this repo + workflow (OIDC).

name: Publish PyPI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync and test
        run: |
          uv sync --group dev
          uv run pytest tests/ -q

  publish:
    needs: test
    runs-on: ubuntu-latest
    # Optional: `environment: pypi` + matching PyPI publisher for approval gates.
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build distributions
        run: |
          uv sync --group dev
          uv run python -m build --sdist --wheel

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
