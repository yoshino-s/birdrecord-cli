# When pyproject.toml version changes on main: sync skills/ uvx pins, create tag vX.Y.Z,
# GitHub Release, CHANGELOG prepend, optional PyPI publish (same workflow).

name: Release

on:
  push:
    branches:
      - main
    paths:
      - pyproject.toml

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: true

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.gate.outputs.publish }}
      tag: ${{ steps.gate.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Detect version bump
        id: ver
        run: |
          set -euo pipefail
          current=$(python3 << 'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )
          echo "current=${current}" >> "${GITHUB_OUTPUT}"

          prev=""
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            prev=$(git show HEAD^:pyproject.toml 2>/dev/null | python3 -c "
          import sys, tomllib
          raw = sys.stdin.read()
          if not raw.strip():
              raise SystemExit(1)
          print(tomllib.loads(raw)['project']['version'])
          " || true)
          fi
          echo "previous=${prev}" >> "${GITHUB_OUTPUT}"

          if [ "${current}" = "${prev}" ]; then
            echo "bumped=false" >> "${GITHUB_OUTPUT}"
            echo "Version unchanged (${current}); skip release."
          else
            echo "bumped=true" >> "${GITHUB_OUTPUT}"
            echo "Version bumped: ${prev:-<none>} -> ${current}"
          fi

      - name: Create tag and GitHub Release
        id: release
        if: steps.ver.outputs.bumped == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.current }}"
          TAG="v${VERSION}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

          git fetch --tags --force

          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "created=false" >> "${GITHUB_OUTPUT}"
            echo "Tag ${TAG} already exists; skip tag and release."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          python3 scripts/sync_skill_uvx_pins.py "${VERSION}"
          if ! git diff --quiet -- skills/ README.md README.zh-CN.md; then
            git add skills/ README.md README.zh-CN.md
            git commit -m "chore: sync uvx version pins to ${VERSION}"
            git push origin "HEAD:${{ github.ref }}"
            git pull --ff-only origin "${{ github.ref_name }}"
          fi

          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "refs/tags/${TAG}"

          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes

          echo "created=true" >> "${GITHUB_OUTPUT}"
          echo "Published ${TAG}"

      - name: PyPI publish gate
        id: gate
        if: always()
        run: |
          set -euo pipefail
          ver="${{ steps.ver.outputs.current }}"
          tag="v${ver}"
          publish=false
          if [ '${{ steps.ver.outputs.bumped }}' = 'true' ] && [ '${{ steps.release.outputs.created }}' = 'true' ]; then
            publish=true
          fi
          echo "publish=${publish}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Update CHANGELOG.md
        if: success() && steps.ver.outputs.bumped == 'true' && steps.release.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 << 'PY'
          import json
          import os
          import pathlib
          import subprocess
          from datetime import datetime, timezone

          tag = os.environ["TAG"]
          repo = os.environ["GITHUB_REPOSITORY"]
          releases_url = f"https://github.com/{repo}/releases"

          raw = subprocess.check_output(
              ["gh", "release", "view", tag, "--json", "body"],
              text=True,
          )
          body = json.loads(raw)["body"]
          if not (body or "").strip():
              body = "_No release notes generated._"

          date = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          ver = tag.removeprefix("v")
          block = f"## [{ver}] — {date}\n\n{body.strip()}\n\n---\n\n"

          path = pathlib.Path("CHANGELOG.md")
          if path.exists():
              old = path.read_text(encoding="utf-8")
          else:
              old = (
                  "# Changelog\n\n"
                  f"All releases: [{releases_url}]({releases_url}).\n\n---\n\n"
              )

          path.write_text(block + old, encoding="utf-8")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: changelog for ${TAG}"
          git push

  publish-pypi:
    needs: tag-and-release
    if: needs.tag-and-release.outputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag-and-release.outputs.tag }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync, test, build
        run: |
          uv sync --group dev
          uv run pytest tests/ -q
          uv run python -m build --sdist --wheel

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
